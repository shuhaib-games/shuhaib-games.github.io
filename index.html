<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUHAIB | MISSION PROFILE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

    <div class="scanlines"></div>

    <div class="video-container">
        <div class="overlay"></div>
        <video autoplay muted loop playsinline id="bg-video">
            <source src="videos/hero-bg.mp4" type="video/mp4">
        </video>
    </div>

    <main>
        <nav>
            <div class="logo">SHUHAIB<span>TP</span></div>
            <div class="nav-links">
                <a href="#about">BRIEFING</a>
                <a href="#missions">MISSIONS</a>
                <a href="#skills">LOADOUT</a>
                <a href="mailto:your-email@gmail.com" class="btn-neon">ESTABLISH COMMS</a>
            </div>
        </nav>

        <section id="hero">
            <div class="hero-content">
                <h2 class="glitch-text" data-text="UNITY DEVELOPER">UNITY DEVELOPER</h2>
                <h1 class="main-title">SHUHAIB TP</h1>
                
                <div class="typewriter-container">
                    <span id="typewriter"></span><span class="cursor">|</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        // TYPEWRITER LOGIC
        const textElement = document.getElementById('typewriter');
        const phrases = [
            "C# / UNITY / AI SYSTEMS",
            "3D & 2D WORLD BUILDING",
            "GAMEPLAY PROGRAMMING",
            "PERFORMANCE OPTIMIZATION",
            "MISSION READY"
        ];
        
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let typeSpeed = 100;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            
            if (isDeleting) {
                textElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
                typeSpeed = 50;
            } else {
                textElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
                typeSpeed = 100;
            }

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true;
                typeSpeed = 2000; // Pause at end
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        document.addEventListener('DOMContentLoaded', type);
    </script>
</body>
</html>
